name: Build explainers

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check route ownership
        run: npm run check:routes

      - name: Build Astro site
        run: npx astro build

      - name: Normalize built explainer pages
        run: node scripts/normalize-explainer-pages.mjs
